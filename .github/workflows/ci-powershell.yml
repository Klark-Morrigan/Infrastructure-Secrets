name: CI

# Delegates to the shared PowerShell CI workflow in Common-PowerShell.
# Kept as a local file so the pull_request trigger works for PRs in this repo,
# and so release.yml can call it via workflow_call without an external reference.
on:
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  ci:
    uses: Klark-Morrigan/Common-PowerShell/.github/workflows/ci-powershell.yml@master
